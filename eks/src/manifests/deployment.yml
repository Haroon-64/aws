apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-publisher
spec:
  replicas: 2
  selector:
    matchLabels:
      app: publisher
  template:
    metadata:
      labels:
        app: publisher
    spec:
      automountServiceAccountToken: false
      containers:
        - name: fastapi
          image: 000000000000.dkr.ecr.us-east-1.localhost.localstack.cloud:4566/fastapi-sns:1.0
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "1Gi"
            limits:
              cpu: "500m"
              memory: "256Mi"
              ephemeral-storage: "2Gi"
